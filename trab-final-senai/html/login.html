<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body class="min-vh-100 d-flex justify-content-center align-items-center px-3">
    <main class="login-card card border-0">
        <div class="card-body p-4 p-sm-5">
            <div class="text-center mb-4">
                <h1 class="h3 mb-2">Acesso ao Sistema</h1>
                <p class="text-muted mb-0">Use um dos acessos de exemplo:</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="usuario" class="form-label">Usuário</label>
                    <input
                        id="usuario"
                        class="form-control"
                        placeholder="Digite seu usuário"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label for="senha" class="form-label">Senha</label>
                    <input
                        id="senha"
                        class="form-control"
                        type="password"
                        placeholder="Digite sua senha"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button class="btn btn-login w-100" type="submit">Entrar</button>
            </form>

            <div class="hint mt-4">
                <strong>Admin:</strong> admin / admin123<br>
                <strong>Cliente:</strong> cliente / cliente123
            </div>

            <div id="erro" class="mt-3" role="alert"></div>
        </div>
    </main>

    <script src="../js/login.js"></script>
</body>
</html>
