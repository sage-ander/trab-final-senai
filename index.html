<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário Cultural da Cidade</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container py-4">
    <h1 class="text-center mb-4">Calendário Cultural da Cidade</h1>

    <div class="card mb-4">
      <div class="card-body">
        <h2 class="h5 mb-3">Cadastrar evento</h2>
        <form id="formEvento" class="row g-3">
          <div class="col-md-6">
            <label for="nome" class="form-label">Nome do evento</label>
            <input type="text" id="nome" class="form-control" required />
          </div>

          <div class="col-md-3">
            <label for="data" class="form-label">Data</label>
            <input type="date" id="data" class="form-control" required />
          </div>

          <div class="col-md-3">
            <label for="horario" class="form-label">Horário</label>
            <input type="time" id="horario" class="form-control" required />
          </div>

          <div class="col-md-6">
            <label for="local" class="form-label">Local</label>
            <input type="text" id="local" class="form-control" required />
          </div>

          <div class="col-md-6">
            <label for="categoria" class="form-label">Categoria</label>
            <select id="categoria" class="form-select" required>
              <option value="Música">Música</option>
              <option value="Teatro">Teatro</option>
              <option value="Feira">Feira</option>
              <option value="Exposição">Exposição</option>
              <option value="Dança">Dança</option>
              <option value="Outro">Outro</option>
            </select>
          </div>

          <div class="col-12">
            <label for="descricao" class="form-label">Descrição curta</label>
            <textarea id="descricao" class="form-control" rows="2" required></textarea>
          </div>

          <div class="col-12 text-end">
            <button type="submit" class="btn btn-primary">Adicionar evento</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <h2 class="h5 mb-3">Filtros</h2>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="filtroCategoria" class="form-label">Categoria</label>
            <select id="filtroCategoria" class="form-select">
              <option value="Todos">Todos</option>
              <option value="Música">Música</option>
              <option value="Teatro">Teatro</option>
              <option value="Feira">Feira</option>
              <option value="Exposição">Exposição</option>
              <option value="Dança">Dança</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          <div class="col-md-6">
            <label for="filtroData" class="form-label">Data</label>
            <input type="date" id="filtroData" class="form-control" />
          </div>
        </div>
      </div>
    </div>

    <div id="listaEventos" class="row g-3"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
