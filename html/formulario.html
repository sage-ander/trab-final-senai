<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Novo Evento</title>
    <link rel="stylesheet" href="../css/formulario.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>📝 Registrar Novo Evento</h2>
            </div>
            <div class="card-body">
                <div class="form-container">
                    <p class="alert alert-info">
                        Preencha os dados para adicionar um evento ao calendário cultural
                    </p>
                    
                    <form id="eventoForm">
                        <!-- Título -->
                        <div class="form-group">
                            <label class="required">📌 Título do Evento</label>
                            <input type="text" id="titulo" class="form-control" placeholder="Ex: Sarau de Poesias, Festival" required>
                            
                        </div>
                        
                        <!-- Tipo -->
                        <div class="form-group">
                            <label>🎭 Tipo de Evento</label>
                            <select id="tipo" class="form-control">
                                <option value="cultural">🎭 Cultural</option>
                                <option value="show">🎤 Show/Música</option>
                                <option value="teatro">🎪 Teatro/Dança</option>
                                <option value="oficina">📚 Oficina/Workshop</option>
                                <option value="exposicao">🖼️ Exposição/Museu</option>
                                <option value="festival">🎉 Festival/Feira</option>
                                <option value="palestra">🎓 Palestra/Debate</option>
                                <option value="outro">✨ Outro</option>
                            </select>
                        </div>
                        
                        <!-- Horário -->
                        <div class="form-group">
                            <label>⏰ Horário do Evento</label>
                            <input type="time" id="horario" class="form-control">
                            <small style="color: #666;">Ex: 19:00, 14:30</small>
                        </div>
                        
                        <!-- Descrição -->
                        <div class="form-group">
                            <label>📝 Descrição do Evento</label>
                            <textarea id="descricao" class="form-control" rows="4" placeholder="Descreva o evento, local, atrações..."></textarea>
                        </div>
                        
                        <!-- Link Ingressos -->
                        <div class="form-group">
                            <label>🎟️ Link para Compra de Ingressos</label>
                            <input type="url" id="linkIngressos" class="form-control" placeholder="https://...">
                            
                        </div>
                        
                        <!-- Data de início -->
                        <div class="form-group">
                            <label class="required">📅 Data de início</label>
                            <input type="date" id="dataInicio" class="form-control" required>
                        </div>

                        <!-- Data de término -->
                        <div class="form-group">
                            <label class="required">📅 Data de término</label>
                            <input type="date" id="dataFim" class="form-control" required>
                            <div class="error-message" id="errorDataFim">A data de término não pode ser menor que a data de início</div>
                        </div>

<!-- Data -->
                        <div class="form-group">
                            <label>📅 Data do Evento</label>
                            <input type="date" id="dataEvento" class="form-control">
                            <small style="color: #666;">Selecione a data do evento. Se não escolher, usará a data atual.</small>
                        </div>
                        
                        <!-- Botões -->
                        <div class="form-buttons">
                            <button type="submit" class="btn btn-primary">💾 Salvar Evento</button>
                            <button type="button" id="btnVoltar" class="btn btn-secondary">← Voltar ao Calendário</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card-footer">
                Calendário Cultural da Unidade - Gerência de Eventos
            </div>
        </div>
    </div>
    
    <script src="../js/formulario.js"></script>
</body>
</html>
